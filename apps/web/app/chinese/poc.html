<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>識字小達人 - 後端驅動版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'chinese-learning-app';

        window.db = db;
        window.appId = appId;
        window.currentUser = null;

        async function initAuth() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    window.currentUser = user;
                    console.log("已登入:", user.uid);
                    if (window.checkQuestionsCount) window.checkQuestionsCount();
                });
            } catch (error) {
                console.error("Auth Error:", error);
            }
        }
        initAuth();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .card { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .speaking-indicator { animation: pulse 1s infinite; background-color: #3b82f6 !important; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .file-drop-area { border: 2px dashed #cbd5e1; transition: all 0.2s ease; }
        .file-drop-area.drag-over { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div id="app-container" class="max-w-2xl w-full">
        
        <!-- 學生模式：預設顯示 -->
        <div id="student-mode" class="hidden bg-white rounded-2xl card p-8 text-center border border-slate-100">
            <div class="flex justify-between items-center mb-6">
                <div id="progress" class="text-slate-500 font-bold text-sm">進度: 0 / 20</div>
                <div id="score" class="bg-slate-100 text-slate-700 px-4 py-1 rounded-full text-sm font-semibold">得分: 0</div>
            </div>

            <div id="game-content">
                <div class="mb-10 relative">
                    <button id="speak-btn" onclick="speakQuestion()" class="mb-4 bg-blue-500 hover:bg-blue-600 p-4 rounded-full transition-all text-white mx-auto block shadow-lg active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                    </button>
                    <div id="question-text" class="text-4xl font-bold text-slate-800 min-h-[120px] flex items-center justify-center px-4 leading-relaxed">載入中...</div>
                </div>
                <div id="options" class="grid grid-cols-1 gap-4"></div>
                <button id="start-btn" onclick="startGame()" class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-xl transition-all">開始隨機測驗</button>
            </div>

            <div id="end-screen" class="hidden py-10">
                <div class="text-6xl mb-6">🎉</div>
                <h2 class="text-3xl font-bold mb-2 text-slate-800">練習完成！</h2>
                <p id="final-score" class="text-2xl font-semibold text-blue-600 mb-8">得分: 0</p>
                <button onclick="startGame()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl hover:bg-slate-900 transition-all">再挑戰一次</button>
            </div>
        </div>

        <!-- 老師模式：管理介面 -->
        <div id="admin-mode" class="hidden bg-white rounded-2xl card p-8 border border-slate-100">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-slate-800">老師管理系統</h2>
                <div id="db-info" class="text-xs text-blue-500 bg-blue-50 px-2 py-1 rounded">題庫量: 載入中...</div>
            </div>
            
            <div id="drop-zone" class="file-drop-area rounded-xl p-8 mb-6 text-center cursor-pointer">
                <input type="file" id="file-input" class="hidden" accept=".txt,.md">
                <div class="text-slate-400 mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="font-medium text-slate-600">點擊或拖放檔案至此處上傳 (.txt/.md)</p>
                </div>
            </div>

            <div class="mb-4">
                <textarea id="resource-input" class="w-full h-48 p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="教材內容將顯示於此..."></textarea>
            </div>
            
            <div class="flex items-center gap-4 mb-6">
                <select id="gen-count" class="border border-slate-200 rounded-lg p-2 bg-slate-50 font-bold">
                    <option value="5">5 題</option>
                    <option value="10" selected>10 題</option>
                    <option value="20">20 題</option>
                    <option value="50">50 題</option>
                </select>
                <button onclick="generateAndSave()" id="gen-btn" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 disabled:opacity-50">
                    開始 AI 轉換並存入題庫
                </button>
            </div>

            <div id="admin-log" class="text-xs bg-slate-900 p-4 rounded-xl h-44 overflow-y-auto font-mono text-emerald-400 border border-slate-800 shadow-inner">
                [系統] 網址後加入 ?mode=admin 即可進入此頁面
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let questionPool = [];
        let currentQuestion = null;
        let score = 0;
        let questionCount = 0;
        let isAnswered = false;

        // --- 路由處理 (切換 Domain 入口) ---
        function initRouter() {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');

            if (mode === 'admin') {
                document.getElementById('admin-mode').classList.remove('hidden');
                document.getElementById('student-mode').classList.add('hidden');
                initFileUpload();
            } else {
                document.getElementById('student-mode').classList.remove('hidden');
                document.getElementById('admin-mode').classList.add('hidden');
            }
        }

        // --- 檔案處理 ---
        function initFileUpload() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            dropZone.onclick = () => fileInput.click();
            dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
            dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
            dropZone.ondrop = (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                handleFile(e.dataTransfer.files[0]);
            };
            fileInput.onchange = (e) => handleFile(e.target.files[0]);
        }

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('resource-input').value = e.target.result;
                document.getElementById('admin-log').innerHTML += `<div>> 載入檔案: ${file.name}</div>`;
            };
            reader.readAsText(file);
        }

        // --- Firebase 操作 ---
        window.checkQuestionsCount = async () => {
            if (!window.currentUser) return;
            try {
                const { collection, getDocs } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
                const colRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'questions');
                const snapshot = await getDocs(colRef);
                const info = document.getElementById('db-info');
                if(info) info.innerText = `題庫量: ${snapshot.size} 題`;
            } catch (e) { console.error(e); }
        }

        async function generateAndSave() {
            const resource = document.getElementById('resource-input').value.trim();
            if (!resource) return alert("內容不能為空");
            
            const btn = document.getElementById('gen-btn');
            const log = document.getElementById('admin-log');
            const count = document.getElementById('gen-count').value;

            btn.disabled = true;
            log.innerHTML += `<div>> AI 正在生成 ${count} 題中...</div>`;

            try {
                const prompt = `教材：「${resource.substring(0, 1500)}」。設計 ${count} 題識字測驗。JSON:{"questions": [{"text": "句子(空格____)", "answer": "正確字", "options": ["錯字1", "錯字2"]}]}`;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "你是國小中文老師，設計填空題。選項要有干擾力。" }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const result = await response.json();
                const data = JSON.parse(result.candidates[0].content.parts[0].text);
                const { collection, addDoc } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
                const colRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'questions');

                for (const q of data.questions) {
                    await addDoc(colRef, { ...q, createdAt: new Date().toISOString() });
                }
                log.innerHTML += `<div class="text-yellow-400">> 成功存入題庫！</div>`;
                window.checkQuestionsCount();
            } catch (error) {
                log.innerHTML += `<div class="text-rose-400">! 失敗: ${error.message}</div>`;
            } finally { btn.disabled = false; }
        }

        // --- 遊戲邏輯 ---
        async function startGame() {
            score = 0; questionCount = 0;
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-content').classList.remove('hidden');
            document.getElementById('start-btn').classList.add('hidden');

            const { collection, getDocs } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
            const colRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'questions');
            const snapshot = await getDocs(colRef);
            
            if (snapshot.empty) {
                document.getElementById('question-text').innerText = "資料庫無題目，請洽老師。";
                return;
            }
            questionPool = snapshot.docs.map(doc => doc.data()).sort(() => Math.random() - 0.5);
            nextQuestion();
        }

        function nextQuestion() {
            if (questionCount >= 20 || questionCount >= questionPool.length) {
                document.getElementById('game-content').classList.add('hidden');
                document.getElementById('end-screen').classList.remove('hidden');
                document.getElementById('final-score').innerText = `得分: ${score}`;
                return;
            }
            isAnswered = false;
            currentQuestion = questionPool[questionCount++];
            document.getElementById('progress').innerText = `進度: ${questionCount} / ${Math.min(20, questionPool.length)}`;
            document.getElementById('question-text').innerText = currentQuestion.text;

            const opts = [...currentQuestion.options, currentQuestion.answer].sort(() => Math.random() - 0.5);
            const container = document.getElementById('options');
            container.innerHTML = '';
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "p-5 border-2 border-slate-200 rounded-2xl text-2xl font-bold hover:bg-blue-50 transition-all";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
            speakQuestion();
        }

        async function checkAnswer(selected, btn) {
            if (isAnswered) return;
            isAnswered = true;
            if (selected === currentQuestion.answer) {
                score += 10;
                btn.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700');
                await speakWithAI("棒！" + currentQuestion.answer);
            } else {
                btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
                await speakWithAI(`錯了，是 ${currentQuestion.answer}`);
            }
            setTimeout(nextQuestion, 1500);
        }

        // --- 語音系統 ---
        async function speakWithAI(text) {
            const speakBtn = document.getElementById('speak-btn');
            speakBtn.classList.add('speaking-indicator');
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });
                const result = await response.json();
                const audioData = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                if (audioData) {
                    const audioBlob = pcmToWavBlob(audioData, 24000);
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    return new Promise((resolve) => {
                        audio.onended = () => { speakBtn.classList.remove('speaking-indicator'); resolve(); };
                        audio.play();
                    });
                }
            } catch (e) { console.error(e); }
            speakBtn.classList.remove('speaking-indicator');
        }

        function pcmToWavBlob(base64Data, sampleRate) {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
            writeString(0, 'RIFF'); view.setUint32(4, 36 + len, true); writeString(8, 'WAVE'); writeString(12, 'fmt ');
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(36, 'data'); view.setUint32(40, len, true);
            return new Blob([wavHeader, bytes], { type: 'audio/wav' });
        }

        function speakQuestion() {
            if (!currentQuestion) return;
            speakWithAI(currentQuestion.text.replace(/____/g, currentQuestion.answer));
        }

        window.onload = initRouter;
    </script>
</body>
</html>
